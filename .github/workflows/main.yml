name: CI

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "*"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ailay-platform/cert-manager-webhook-gandi

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Get Go version
        id: versions
        run: |
          echo go_version=$(go mod edit -json | grep -Po '"Go":\s+"([0-9.]+)"' | sed -E 's/.+"([0-9.]+)"/\1/') >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.versions.outputs.go_version }}

      - name: Install kubebuilder test assets
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ASSETS=$(setup-envtest use --bin-dir /tmp/kubebuilder -p path)
          echo "TEST_ASSET_ETCD=${ASSETS}/etcd" >> $GITHUB_ENV
          echo "TEST_ASSET_KUBE_APISERVER=${ASSETS}/kube-apiserver" >> $GITHUB_ENV

      - name: Run tests
        run: go test ./...
        env:
          TEST_ZONE_NAME: ${{ secrets.TEST_ZONE_NAME }}

  build-and-push-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Get versions
        id: versions
        run: |
          echo go_version=$(go mod edit -json | grep -Po '"Go":\s+"([0-9.]+)"' | sed -E 's/.+"([0-9.]+)"/\1/') >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: GO_VERSION=${{ steps.versions.outputs.go_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
